##############################################################
# AccountingPro — Nginx Virtual Host Configuration
# File: /etc/nginx/sites-available/accountingpro
#
# SETUP:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/accountingpro
#   sudo ln -s /etc/nginx/sites-available/accountingpro /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    listen [::]:80;

    # ── Change to your domain or server IP ──────────────────
    server_name accountingpro.example.com YOUR_SERVER_IP;

    root /var/www/html/system-ac/public;
    index index.php index.html;

    # ── Max upload size (for receipt/import uploads) ─────────
    client_max_body_size 50M;

    # ── Charset ───────────────────────────────────────────────
    charset utf-8;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/accountingpro_access.log;
    error_log  /var/log/nginx/accountingpro_error.log;

    # ── Front controller routing ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Security: block sensitive files ──────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ /database/ {
        deny all;
        return 404;
    }

    location ~ /storage/(?!pdfs|receipts) {
        deny all;
        return 404;
    }

    # ── Static assets caching ─────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

