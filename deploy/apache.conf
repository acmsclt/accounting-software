##############################################################
# AccountingPro — Apache Virtual Host Configuration
# File: /etc/apache2/sites-available/accountingpro.conf
#
# SETUP:
#   sudo cp deploy/apache.conf /etc/apache2/sites-available/accountingpro.conf
#   sudo a2ensite accountingpro
#   sudo a2enmod rewrite headers
#   sudo systemctl reload apache2
##############################################################

<VirtualHost *:80>
    # ── Change to your domain or server IP ──────────────────
    ServerName accountingpro.example.com
    # ServerAlias www.accountingpro.example.com

    DocumentRoot /var/www/html/system-ac/public

    # ── Directory rules ───────────────────────────────────────
    <Directory /var/www/html/system-ac/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Block access to sensitive directories ─────────────────
    <Directory /var/www/html/system-ac/database>
        Require all denied
    </Directory>
    <Directory /var/www/html/system-ac/app>
        Require all denied
    </Directory>
    <DirectoryMatch "/var/www/html/system-ac/(storage|logs)">
        Require all denied
    </DirectoryMatch>

    # ── Max upload size ───────────────────────────────────────
    LimitRequestBody 52428800

    # ── Logs ─────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/accountingpro_error.log
    CustomLog ${APACHE_LOG_DIR}/accountingpro_access.log combined

    # ── Security headers ──────────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    </IfModule>
</VirtualHost>
